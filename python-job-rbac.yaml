apiVersion: v1
kind: ServiceAccount
metadata:
  name: python-job-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: python-service-reader
rules:
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get","list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: python-service-reader-binding
subjects:
- kind: ServiceAccount
  name: python-job-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: python-service-reader
  apiGroup: rbac.authorization.k8s.io
