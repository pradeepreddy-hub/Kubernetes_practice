apiVersion: v1
kind: ServiceAccount
metadata:
  name: ubuntu-python-sa
  namespace: dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dev-resource-reader
  namespace: dev
rules:
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get","list"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get","list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-resource-binding
  namespace: dev
subjects:
- kind: ServiceAccount
  name: ubuntu-python-sa
  namespace: dev
roleRef:
  kind: Role
  name: dev-resource-reader
  apiGroup: rbac.authorization.k8s.io
